<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YAK Store - مراجع منتجات أمازون</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        input, textarea, select { -webkit-user-select: text; user-select: text; }
        
        .login-container { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-card { background: white; border-radius: 15px; padding: 40px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); max-width: 400px; width: 100%; }
        .login-title { text-align: center; font-size: 28px; color: #333; margin-bottom: 30px; font-weight: 700; }
        .input-field { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 14px; margin-bottom: 15px; }
        .input-field:focus { outline: none; border-color: #667eea; }
        .login-btn { width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; font-size: 16px; }
        .error-msg { color: #f44336; text-align: center; margin-bottom: 15px; font-size: 14px; }

        #app { display: none; }
        .app-header { background: #ffffff; padding: 20px; border-radius: 12px; margin-bottom: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.15); border: 1px solid #f0f0f0; }
        .header-top { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .header-title h1 { font-size: 28px; color: #667eea; margin-bottom: 5px; font-weight: 700; }
        .header-title p { color: #999; font-size: 13px; }
        .user-section { text-align: left; background: #f5f5f5; padding: 10px 15px; border-radius: 8px; }
        .user-info { color: #333; font-size: 13px; margin-bottom: 5px; font-weight: 600; }
        .logout-btn { background: #f44336; color: white; border: none; padding: 8px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; font-weight: 600; margin-top: 8px; width: 100%; }

        .tabs { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; padding: 12px 0; border-bottom: 2px solid #e0e0e0; background: #ffffff; border-radius: 8px; padding-left: 12px; }
        .tab-btn { padding: 10px 18px; background: #f5f5f5; color: #333; border: 2px solid #e0e0e0; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 14px; transition: all 0.3s; }
        .tab-btn:hover { background: #eeeeee; border-color: #667eea; }
        .tab-btn.active { background: #667eea; color: #ffffff; border-color: #667eea; font-weight: 700; box-shadow: 0 2px 8px rgba(102, 126, 234, 0.3); }

        .content-card { background: white; border-radius: 12px; padding: 25px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }

        h2 { font-size: 22px; color: #333; margin-bottom: 20px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: 600; color: #333; margin-bottom: 6px; font-size: 13px; }
        .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 6px; font-size: 14px; }
        .form-group input:focus, .form-group textarea:focus { outline: none; border-color: #667eea; }
        .form-group textarea { min-height: 80px; resize: vertical; }

        .btn-primary { width: 100%; padding: 12px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border: none; border-radius: 8px; font-weight: 600; cursor: pointer; margin-top: 10px; font-size: 14px; }
        .btn-secondary { background: #999; }
        .btn-small { display: inline-block; padding: 6px 12px; margin-right: 8px; margin-bottom: 8px; background: #2196F3; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 12px; }
        .btn-small.danger { background: #f44336; }

        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 12px; margin-bottom: 20px; }
        .stat-card { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 20px; border-radius: 8px; text-align: center; }
        .stat-num { font-size: 28px; font-weight: 700; }
        .stat-label { font-size: 12px; margin-top: 8px; opacity: 0.9; }

        table { width: 100%; border-collapse: collapse; margin: 20px 0; }
        th, td { padding: 12px; text-align: right; border-bottom: 1px solid #e0e0e0; font-size: 13px; }
        th { background: #f5f5f5; font-weight: 600; color: #333; }
        tr:hover { background: #f9f9f9; }

        .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
        .status-yes { background: #e8f5e9; color: #4caf50; }
        .status-no { background: #f0f0f0; color: #666; }
        .status-available { background: #e8f5e9; color: #4caf50; }
        .status-limited { background: #fff3e0; color: #ff9800; }
        .status-unavailable { background: #ffebee; color: #f44336; }

        .message { padding: 12px; border-radius: 6px; margin-top: 10px; font-size: 13px; }
        .msg-success { background: #e8f5e9; color: #4caf50; }
        .msg-error { background: #ffebee; color: #f44336; }

        .hidden { display: none !important; }
    </style>
</head>
<body>

<!-- LOGIN -->
<div id="login" class="login-container">
    <div class="login-card">
        <div class="login-title">🏪 YAK Store</div>
        <div style="text-align: center; color: #999; margin-bottom: 25px;">تسجيل الدخول</div>
        <div id="loginError" class="error-msg"></div>
        <input type="text" id="username" class="input-field" placeholder="اسم المستخدم" autocomplete="off">
        <input type="password" id="password" class="input-field" placeholder="كلمة المرور" autocomplete="off">
        <button class="login-btn" onclick="login()">دخول</button>
    </div>
</div>

<!-- APP -->
<div id="app">
    <div class="app-header">
        <div class="header-top">
            <div class="header-title">
                <h1>🏪 YAK Store - مراجع منتجات أمازون</h1>
                <p>نظام احترافي للمراجعة والتقارير</p>
            </div>
            <div class="user-section">
                <div class="user-info">👤 <span id="username-display"></span></div>
                <div class="user-info">🔑 <span id="role-display"></span></div>
                <button class="logout-btn" onclick="logout()">تسجيل خروج</button>
            </div>
        </div>
        <div class="tabs" id="tabs-container"></div>
    </div>

    <!-- ADD PRODUCT -->
    <div id="add" class="tab-content content-card">
        <h2>➕ إضافة منتج جديد</h2>
        <div class="form-group">
            <label>رابط المنتج (مطلوب)</label>
            <input type="text" id="link" placeholder="https://www.amazon.eg/...">
        </div>
        <div class="form-group">
            <label>اسم المنتج (مطلوب)</label>
            <input type="text" id="name" placeholder="اسم المنتج">
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <div class="form-group">
                <label>ASIN</label>
                <input type="text" id="asin" placeholder="ASIN">
            </div>
            <div class="form-group">
                <label>البراند</label>
                <input type="text" id="brand" placeholder="البراند">
            </div>
        </div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
            <div class="form-group">
                <label>السعر</label>
                <input type="text" id="price" placeholder="السعر">
            </div>
            <div class="form-group">
                <label>القسم</label>
                <select id="category">
                    <option value="">-- اختر --</option>
                    <option value="إلكترونيات">إلكترونيات</option>
                    <option value="ملابس">ملابس</option>
                    <option value="منزل">منزل</option>
                </select>
            </div>
        </div>
        <div class="form-group">
            <label>رابط الصورة (من أمازون) 🖼️</label>
            <input type="text" id="imageUrl" placeholder="https://m.media-amazon.com/images/...">
        </div>
        <div class="form-group">
            <label>الوصف (من صفحة المنتج)</label>
            <textarea id="description" placeholder="الوصف التفصيلي للمنتج..."></textarea>
        </div>
        <div class="form-group">
            <label>ملاحظات</label>
            <textarea id="notes" placeholder="ملاحظات..."></textarea>
        </div>
        <button class="btn-primary" onclick="addProduct()">✓ أضف المنتج</button>
        <div id="add-msg" class="message hidden"></div>

        <hr style="margin: 30px 0; border: none; border-top: 1px solid #e0e0e0;">
        <h3 style="color: #333; margin-bottom: 15px;">📊 رفع ملف Excel</h3>
        <input type="file" id="excel-file" accept=".xlsx,.xls" onchange="uploadExcel()">
    </div>

    <!-- REVIEW -->
    <div id="review" class="tab-content content-card">
        <h2>✓ مراجعة المنتجات</h2>
        <div id="review-content"></div>
    </div>

    <!-- RESULTS -->
    <div id="results" class="tab-content content-card">
        <h2>📊 النتائج والإحصائيات</h2>
        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-num" id="total">0</div>
                <div class="stat-label">إجمالي</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="reviewed">0</div>
                <div class="stat-label">مراجع</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="purchased">0</div>
                <div class="stat-label">مشتري</div>
            </div>
            <div class="stat-card">
                <div class="stat-num" id="pending">0</div>
                <div class="stat-label">بانتظار</div>
            </div>
        </div>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 15px;">
            <div>
                <label style="display: block; font-weight: 600; color: #333; margin-bottom: 6px; font-size: 13px;">تصفية الحالة:</label>
                <select id="status-filter" onchange="applyFilter()" style="width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 6px; font-size: 13px;">
                    <option value="">-- الكل --</option>
                    <option value="متوفر بكثرة">✓ متوفر بكثرة</option>
                    <option value="متوفر بقلة">⚠️ متوفر بقلة</option>
                    <option value="غير متوفر">✗ غير متوفر</option>
                    <option value="لم يراجع">لم يراجع</option>
                </select>
            </div>
            <div>
                <label style="display: block; font-weight: 600; color: #333; margin-bottom: 6px; font-size: 13px;">عدد الصفوف:</label>
                <select id="page-size" onchange="applyFilter()" style="width: 100%; padding: 10px; border: 2px solid #e0e0e0; border-radius: 6px; font-size: 13px;">
                    <option value="5">5 منتجات</option>
                    <option value="10" selected>10 منتجات</option>
                    <option value="20">20 منتج</option>
                    <option value="50">50 منتج</option>
                </select>
            </div>
        </div>

        <div style="overflow-x: auto;">
            <table>
                <thead>
                    <tr>
                        <th>المنتج</th>
                        <th>التاريخ</th>
                        <th>الحالة</th>
                        <th>المورد</th>
                        <th>الشراء</th>
                    </tr>
                </thead>
                <tbody id="results-table"></tbody>
            </table>
        </div>

        <div style="display: flex; gap: 10px; justify-content: center; align-items: center; margin: 20px 0; flex-wrap: wrap;">
            <button style="padding: 8px 15px; background: #667eea; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600;" onclick="previousPage()">← السابق</button>
            <span id="page-info" style="font-weight: 600; color: #333; min-width: 100px; text-align: center;">الصفحة 1</span>
            <button style="padding: 8px 15px; background: #667eea; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: 600;" onclick="nextPage()">التالي →</button>
        </div>

        <div style="display: flex; gap: 8px;">
            <button class="btn-small" onclick="downloadExcel()" style="background: #4caf50; flex: 1;">📥 Excel</button>
            <button class="btn-small" onclick="downloadCSV()" style="background: #2196F3; flex: 1;">📥 CSV</button>
        </div>
    </div>

    <!-- SETTINGS -->
    <div id="settings" class="tab-content content-card">
        <h2>⚙️ إدارة المستخدمين</h2>
        <div id="users-list"></div>
        <hr style="margin: 20px 0; border: none; border-top: 1px solid #e0e0e0;">
        <h3 style="color: #333; margin-bottom: 15px;">➕ إضافة مستخدم</h3>
        <input type="text" id="new-username" placeholder="الاسم" style="width: 100%; padding: 10px; margin-bottom: 10px; border: 2px solid #e0e0e0; border-radius: 6px;">
        <input type="password" id="new-password" placeholder="كلمة المرور" style="width: 100%; padding: 10px; margin-bottom: 10px; border: 2px solid #e0e0e0; border-radius: 6px;">
        <select id="new-role" style="width: 100%; padding: 10px; margin-bottom: 10px; border: 2px solid #e0e0e0; border-radius: 6px;">
            <option value="reviewer">مراجع</option>
            <option value="editor">محرر</option>
            <option value="admin">مسؤول</option>
        </select>
        <button class="btn-primary" onclick="createUser()">إضافة مستخدم</button>
    </div>
</div>

<script>
    let token = null;
    let user = null;
    let data = { products: [], reviews: {} };
    let selectedStatus = null;
    let currentPage = 1;
    let filteredProducts = [];
    let pageSize = 10;

    async function login() {
        const username = document.getElementById('username').value;
        const password = document.getElementById('password').value;
        const err = document.getElementById('loginError');

        if (!username || !password) {
            err.textContent = 'الرجاء إدخال البيانات';
            return;
        }

        try {
            const res = await fetch('/api/auth/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            });

            const result = await res.json();

            if (result.success) {
                token = result.token;
                user = result.user;
                localStorage.setItem('token', token);
                localStorage.setItem('user', JSON.stringify(user));
                showApp();
            } else {
                err.textContent = 'بيانات غير صحيحة!';
            }
        } catch (error) {
            err.textContent = 'خطأ في الاتصال!';
        }
    }

    function logout() {
        token = null;
        user = null;
        localStorage.clear();
        location.reload();
    }

    async function showApp() {
        document.getElementById('login').style.display = 'none';
        document.getElementById('app').style.display = 'block';

        document.getElementById('username-display').textContent = user.username;
        const roles = { admin: 'مسؤول', editor: 'محرر', reviewer: 'مراجع' };
        document.getElementById('role-display').textContent = roles[user.role] || user.role;

        buildTabs();
        loadData();
    }

    function hasPermission(perm) {
        return user?.permissions?.includes(perm);
    }

    function buildTabs() {
        const tabs = [
            { id: 'add', label: '➕ إضافة', perm: 'add_products' },
            { id: 'review', label: '✓ مراجعة', perm: 'review_products' },
            { id: 'results', label: '📊 النتائج', perm: 'view_reports' },
            { id: 'settings', label: '⚙️ الإعدادات', perm: 'manage_users' }
        ];

        const container = document.getElementById('tabs-container');
        container.innerHTML = '';

        tabs.forEach((t, i) => {
            if (hasPermission(t.perm)) {
                const btn = document.createElement('button');
                btn.className = 'tab-btn' + (i === 0 ? ' active' : '');
                btn.textContent = t.label;
                btn.onclick = () => switchTab(t.id);
                container.appendChild(btn);
            }
        });
    }

    function switchTab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.target.classList.add('active');

        if (id === 'review') showReview();
        if (id === 'results') showResults();
        if (id === 'settings') showSettings();
    }

    async function loadData() {
        try {
            const res = await fetch('/api/products', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            data = (await res.json()) || { products: [], reviews: {} };
            showReview();
        } catch (error) {
            console.error(error);
        }
    }

    async function addProduct() {
        const link = document.getElementById('link').value;
        const name = document.getElementById('name').value;

        if (!link || !name) {
            alert('الرابط والاسم مطلوبان!');
            return;
        }

        try {
            await fetch('/api/products', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({
                    link, name,
                    asin: document.getElementById('asin').value,
                    brand: document.getElementById('brand').value,
                    price: document.getElementById('price').value,
                    category: document.getElementById('category').value,
                    imageUrl: document.getElementById('imageUrl').value,
                    description: document.getElementById('description').value,
                    notes: document.getElementById('notes').value
                })
            });

            const msg = document.getElementById('add-msg');
            msg.textContent = '✓ تم الإضافة!';
            msg.className = 'message msg-success';
            msg.classList.remove('hidden');

            document.getElementById('link').value = '';
            document.getElementById('name').value = '';
            document.getElementById('asin').value = '';
            document.getElementById('brand').value = '';
            document.getElementById('price').value = '';
            document.getElementById('category').value = '';
            document.getElementById('imageUrl').value = '';
            document.getElementById('description').value = '';
            document.getElementById('notes').value = '';
            loadData();
        } catch (error) {
            const msg = document.getElementById('add-msg');
            msg.textContent = '❌ خطأ!';
            msg.className = 'message msg-error';
            msg.classList.remove('hidden');
        }
    }

    async function uploadExcel() {
        const file = document.getElementById('excel-file').files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = async (e) => {
            try {
                const wb = XLSX.read(e.target.result, { type: 'array' });
                const data = XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]], { header: 1 });

                const products = [];
                for (let i = 1; i < data.length; i++) {
                    const row = data[i];
                    if (row[0] && row[1]) {
                        products.push({
                            link: row[0], name: row[1], asin: row[2] || '',
                            brand: row[3] || '', price: row[4] || '', category: row[5] || '', notes: row[6] || ''
                        });
                    }
                }

                await fetch('/api/products/bulk', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ products })
                });

                alert(`✓ تم رفع ${products.length} منتج!`);
                loadData();
            } catch (error) {
                alert('❌ خطأ!');
            }
        };
        reader.readAsArrayBuffer(file);
    }

    function showReview() {
        const pending = data.products.find(p => !data.reviews[p.id]);
        const content = document.getElementById('review-content');

        if (!pending) {
            content.innerHTML = '<p style="text-align: center; color: #999; padding: 40px;">✓ تمت مراجعة جميع المنتجات!</p>';
            return;
        }

        const reviewed = Object.keys(data.reviews).length;
        content.innerHTML = `
            <div style="background: #f5f5f5; padding: 15px; border-radius: 8px; margin-bottom: 15px;">
                <strong>${pending.name}</strong><br>
                <small style="color: #999;">المراجعة ${reviewed + 1} من ${data.products.length}</small>
            </div>

            ${pending.imageUrl ? `
                <div style="margin-bottom: 15px; text-align: center;">
                    <img src="${pending.imageUrl}" alt="${pending.name}" style="max-width: 100%; max-height: 300px; border-radius: 8px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
                </div>
            ` : ''}

            ${pending.description ? `
                <div style="background: white; padding: 12px; border-radius: 8px; margin-bottom: 15px; border-right: 4px solid #667eea;">
                    <strong style="color: #333; display: block; margin-bottom: 8px;">📝 وصف المنتج:</strong>
                    <p style="color: #666; font-size: 13px; line-height: 1.6; margin: 0;">${pending.description}</p>
                </div>
            ` : ''}

            <a href="${pending.link}" target="_blank" style="display: inline-block; margin-bottom: 15px; padding: 10px 15px; background: #ff9800; color: white; text-decoration: none; border-radius: 6px; font-weight: 600;">🔗 فتح على أمازون</a>
            
            <div style="margin: 20px 0;">
                <label style="display: block; margin-bottom: 10px; font-weight: 600;">الحالة:</label>
                <button onclick="selectStatus('متوفر بكثرة')" style="padding: 10px; margin: 5px; border: 2px solid #4caf50; background: white; cursor: pointer; border-radius: 6px; font-weight: 600;">✓ متوفر</button>
                <button onclick="selectStatus('متوفر بقلة')" style="padding: 10px; margin: 5px; border: 2px solid #ff9800; background: white; cursor: pointer; border-radius: 6px; font-weight: 600;">⚠️ محدود</button>
                <button onclick="selectStatus('غير متوفر')" style="padding: 10px; margin: 5px; border: 2px solid #f44336; background: white; cursor: pointer; border-radius: 6px; font-weight: 600;">✗ غير متوفر</button>
            </div>

            <div class="form-group">
                <label>اسم المورد</label>
                <input type="text" id="supplier" placeholder="أمازون مصر...">
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px;">
                <div class="form-group">
                    <label>سعر الشراء</label>
                    <input type="number" id="purchase-price" placeholder="0" step="0.01">
                </div>
                <div class="form-group">
                    <label>الكمية</label>
                    <input type="number" id="quantity" placeholder="0" min="0">
                </div>
            </div>
            <div class="form-group">
                <label><input type="checkbox" id="purchased"> تم الشراء</label>
            </div>
            <div class="form-group">
                <label>ملاحظات</label>
                <textarea id="review-notes" placeholder="ملاحظات..."></textarea>
            </div>

            <button class="btn-primary" onclick="saveReview('${pending.id}')">✓ حفظ والتالي</button>
            <button class="btn-primary btn-secondary" style="margin-top: 5px;" onclick="showReview()">⏭️ تخطي</button>
        `;
    }

    function selectStatus(status) {
        selectedStatus = status;
    }

    async function saveReview(id) {
        if (!selectedStatus) {
            alert('اختر الحالة!');
            return;
        }

        try {
            const response = await fetch(`/api/reviews/${id}`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({
                    status: selectedStatus,
                    supplier: document.getElementById('supplier').value,
                    purchasePrice: document.getElementById('purchase-price').value || null,
                    quantity: parseInt(document.getElementById('quantity').value) || 0,
                    purchased: document.getElementById('purchased').checked,
                    notes: document.getElementById('review-notes').value
                })
            });

            if (response.ok) {
                selectedStatus = null;
                // تحميل البيانات الجديدة وعرض المنتج التالي
                await loadData();
                showReview(); // عرض المنتج التالي مباشرة
            } else {
                alert('❌ خطأ في الحفظ!');
            }
        } catch (error) {
            console.error('Error:', error);
            alert('❌ خطأ في الاتصال!');
        }
    }

    async function showResults() {
        const reviewed = Object.keys(data.reviews).length;
        const purchased_count = Object.values(data.reviews).filter(r => r.purchased).length;

        document.getElementById('total').textContent = data.products.length;
        document.getElementById('reviewed').textContent = reviewed;
        document.getElementById('purchased').textContent = purchased_count;
        document.getElementById('pending').textContent = data.products.length - reviewed;

        applyFilter();
    }

    function applyFilter() {
        const statusFilter = document.getElementById('status-filter').value;
        pageSize = parseInt(document.getElementById('page-size').value) || 10;
        
        filteredProducts = data.products.filter(p => {
            if (!statusFilter) return true;
            const r = data.reviews[p.id];
            
            if (statusFilter === 'لم يراجع') return !r;
            return r && r.status === statusFilter;
        });

        currentPage = 1;
        displayResults();
    }

    function displayResults() {
        const start = (currentPage - 1) * pageSize;
        const end = start + pageSize;
        const page = filteredProducts.slice(start, end);
        const totalPages = Math.ceil(filteredProducts.length / pageSize) || 1;

        let html = '';
        page.forEach(p => {
            const r = data.reviews[p.id];
            const statusClass = !r ? 'status-no' : r.status === 'متوفر بكثرة' ? 'status-available' : r.status === 'متوفر بقلة' ? 'status-limited' : 'status-unavailable';
            html += `
                <tr>
                    <td>${p.name}</td>
                    <td>${p.addedAt ? p.addedAt.split(' ')[0] : '-'}</td>
                    <td>${r ? `<span class="status-badge ${statusClass}">${r.status}</span>` : '-'}</td>
                    <td>${r?.supplier || '-'}</td>
                    <td><span class="status-badge ${r?.purchased ? 'status-yes' : 'status-no'}">${r?.purchased ? 'نعم' : 'لا'}</span></td>
                </tr>
            `;
        });

        document.getElementById('results-table').innerHTML = html || '<tr><td colspan="5" style="text-align: center; color: #ccc;">لا توجد نتائج</td></tr>';
        document.getElementById('page-info').textContent = `الصفحة ${currentPage} من ${totalPages}`;
    }

    function previousPage() {
        if (currentPage > 1) {
            currentPage--;
            displayResults();
        }
    }

    function nextPage() {
        const totalPages = Math.ceil(filteredProducts.length / pageSize) || 1;
        if (currentPage < totalPages) {
            currentPage++;
            displayResults();
        }
    }

    function downloadExcel() {
        const headers = ['المنتج', 'ASIN', 'البراند', 'السعر على أمازون', 'القسم', 'الوصف', 'رابط الصورة', 'ملاحظات المنتج', 'التاريخ المضاف', 'الحالة', 'المورد 🏪', 'سعر الشراء', 'الكمية', 'تم الشراء', 'ملاحظات المراجعة', 'تاريخ المراجعة'];
        const ws_data = [headers];

        data.products.forEach(p => {
            const r = data.reviews[p.id];
            ws_data.push([
                p.name || '',
                p.asin || '',
                p.brand || '',
                p.price || '',
                p.category || '',
                p.description || '',
                p.imageUrl || '',
                p.notes || '',
                p.addedAt ? p.addedAt.split('T')[0] : '',
                r?.status || 'لم يراجع',
                r?.supplier || '',
                r?.purchasePrice || '',
                r?.quantity || '',
                r?.purchased ? 'نعم' : 'لا',
                r?.notes || '',
                r?.reviewedAt ? r.reviewedAt.split('T')[0] : ''
            ]);
        });

        const ws = XLSX.utils.aoa_to_sheet(ws_data);
        
        // تنسيق الأعمدة
        const colWidths = [25, 15, 15, 15, 12, 30, 40, 20, 15, 15, 15, 12, 8, 10, 20, 15];
        ws['!cols'] = colWidths.map(w => ({ wch: w }));

        const wb = XLSX.utils.book_new();
        XLSX.utils.book_append_sheet(wb, ws, 'تقرير المنتجات');
        XLSX.writeFile(wb, `تقرير_منتجات_${new Date().toLocaleDateString('ar-EG')}.xlsx`);
    }

    function downloadCSV() {
        const headers = ['المنتج', 'ASIN', 'البراند', 'السعر على أمازون', 'القسم', 'ملاحظات المنتج', 'التاريخ المضاف', 'الحالة', 'المورد', 'سعر الشراء', 'الكمية', 'تم الشراء', 'ملاحظات المراجعة', 'تاريخ المراجعة'];
        let csv = headers.join(',') + '\n';

        data.products.forEach(p => {
            const r = data.reviews[p.id];
            const row = [
                `"${p.name || ''}"`,
                `"${p.asin || ''}"`,
                `"${p.brand || ''}"`,
                `"${p.price || ''}"`,
                `"${p.category || ''}"`,
                `"${(p.notes || '').replace(/"/g, '""')}"`,
                p.addedAt ? p.addedAt.split('T')[0] : '',
                `"${r?.status || 'لم يراجع'}"`,
                `"${r?.supplier || ''}"`,
                r?.purchasePrice || '',
                r?.quantity || '',
                r?.purchased ? 'نعم' : 'لا',
                `"${(r?.notes || '').replace(/"/g, '""')}"`,
                r?.reviewedAt ? r.reviewedAt.split('T')[0] : ''
            ];
            csv += row.join(',') + '\n';
        });

        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(blob);
        link.download = `تقرير_منتجات_${new Date().toLocaleDateString('ar-EG')}.csv`;
        link.click();
    }

    async function showSettings() {
        if (!hasPermission('manage_users')) {
            document.getElementById('users-list').innerHTML = '<p style="color: #f44336;">ليس لديك صلاحية!</p>';
            return;
        }

        try {
            const res = await fetch('/api/admin/users', {
                headers: { 'Authorization': `Bearer ${token}` }
            });
            const result = await res.json();
            const users = result.users || [];

            let html = '<h3 style="color: #333; margin-bottom: 15px;">المستخدمون الحاليون</h3>';
            users.forEach(u => {
                html += `
                    <div style="background: #f5f5f5; padding: 12px; border-radius: 6px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center;">
                        <div>
                            <strong>${u.username}</strong><br>
                            <small style="color: #999;">${u.role}</small>
                        </div>
                        <div>
                            <button class="btn-small" onclick="editUser(${u.id})">تعديل</button>
                            <button class="btn-small danger" onclick="deleteUser(${u.id})">حذف</button>
                        </div>
                    </div>
                `;
            });

            document.getElementById('users-list').innerHTML = html;
        } catch (error) {
            console.error(error);
        }
    }

    async function createUser() {
        const username = document.getElementById('new-username').value;
        const password = document.getElementById('new-password').value;
        const role = document.getElementById('new-role').value;

        if (!username || !password) {
            alert('الاسم وكلمة المرور مطلوبان!');
            return;
        }

        try {
            await fetch('/api/admin/users', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ username, password, role })
            });

            alert('✓ تم الإضافة!');
            document.getElementById('new-username').value = '';
            document.getElementById('new-password').value = '';
            showSettings();
        } catch (error) {
            alert('❌ خطأ!');
        }
    }

    function editUser(id) {
        const password = prompt('كلمة المرور الجديدة:');
        if (password) {
            fetch(`/api/admin/users/${id}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ password })
            }).then(() => {
                alert('✓ تم التحديث!');
                showSettings();
            });
        }
    }

    async function deleteUser(id) {
        if (!confirm('تأكيد الحذف؟')) return;
        await fetch(`/api/admin/users/${id}`, {
            method: 'DELETE',
            headers: { 'Authorization': `Bearer ${token}` }
        });
        alert('✓ تم الحذف!');
        showSettings();
    }

    // Initialize
    window.addEventListener('load', () => {
        const t = localStorage.getItem('token');
        const u = localStorage.getItem('user');

        if (t && u) {
            token = t;
            user = JSON.parse(u);
            showApp();
        }
    });
</script>
